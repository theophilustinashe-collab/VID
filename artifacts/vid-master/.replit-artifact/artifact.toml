kind = "web"
previewPath = "/"
title = "VID Master Zimbabwe"
version = "1.0.0"
id = "artifacts/vid-master"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 24314

[services.development]
run = "pnpm --filter @workspace/vid-master run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/vid-master", "run", "build" ]
publicDir = "artifacts/vid-master/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "24314"
BASE_PATH = "/"
